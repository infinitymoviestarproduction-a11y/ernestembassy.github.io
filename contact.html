<section>
    <h2>Quick Contact Form</h2>

    <form onsubmit="sendToWhatsApp(); return false;">

        <input type="text" id="name" placeholder="Your Name" required><br><br>
        <input type="email" id="email" placeholder="Your Email" required><br><br>

        <select id="service" required>
            <option value="">Select Service</option>
            <option value="Visa Processing">✈ Visa Processing</option>
            <option value="Film Production">🎬 Film Production</option>
            <option value="Education Consulting">🎓 Education Consulting</option>
            <option value="Teaching Services">📚 Teaching Services</option>
        </select>

        <br><br>

        <textarea id="message" placeholder="Your Message" rows="5" required></textarea><br><br>

        <button class="btn" type="submit">Send Message</button>
    </form>
</section>
<script>
function sendToWhatsApp() {
    let name = document.getElementById("name").value;
    let email = document.getElementById("email").value;
    let service = document.getElementById("service").value;
    let message = document.getElementById("message").value;

    let phone = "2348032607809";

    let url =
        "https://wa.me/" + phone +
        "?text=" +
        "👋 Hello Ernest Embassy Team%0A%0A" +
        "👤 Name: " + name + "%0A" +
        "📧 Email: " + email + "%0A" +
        "📌 Service Needed: " + service + "%0A%0A" +
        "💬 Message:%0A" + message + "%0A%0A" +
        "🙏 Kindly respond as soon as possible.";

    window.open(url, "_blank");
}
</script>
