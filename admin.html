<!DOCTYPE html>
<html>
<head>
<title>Admin Dashboard - Ernest Embassy</title>

<!-- PWA SETTINGS -->
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#000000">

<style>
body {
    background: #0d0d0d;
    color: white;
    font-family: Arial;
}

h1 {
    color: gold;
    text-align: center;
    margin-top: 20px;
}

.dashboard {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 15px;
    padding: 20px;
}

.card {
    background: #111;
    border: 1px solid gold;
    padding: 20px;
    border-radius: 10px;
    text-align: center;
}

table {
    width: 95%;
    margin: auto;
    border-collapse: collapse;
}

th, td {
    border: 1px solid gold;
    padding: 10px;
    text-align: center;
}

th {
    color: gold;
}

/* LOGIN */
#loginBox {
    text-align: center;
    margin-top: 120px;
}

input, select, button {
    padding: 10px;
    margin-top: 10px;
}

button {
    background: gold;
    border: none;
    cursor: pointer;
    font-weight: bold;
}
</style>
</head>

<body>

<!-- 🔐 LOGIN -->
<div id="loginBox">
    <h2 style="color:gold;">Admin Login</h2>
    <input type="password" id="password" placeholder="Enter Password"><br>
    <button onclick="login()">Login</button>
</div>

<!-- 📊 DASHBOARD -->
<div id="dashboard" style="display:none;">

<h1>Ernest Embassy Admin Dashboard</h1>

<div class="dashboard">
    <div class="card">
        <h2 id="total">0</h2>
        <p>Total Bookings</p>
    </div>

    <div class="card">
        <h2 id="pending">0</h2>
        <p>Pending</p>
    </div>

    <div class="card">
        <h2 id="today">0</h2>
        <p>Today</p>
    </div>
</div>

<!-- 🔍 FILTER -->
<div style="text-align:center;margin:20px;">
    <select id="filterService" onchange="filterTable()">
        <option value="">All Services</option>
        <option>Visa Processing</option>
        <option>Education Consulting</option>
        <option>Travel Consultation</option>
    </select>
</div>

<h2 style="text-align:center;color:gold;">All Bookings</h2>

<table id="table">
    <tr>
        <th>Name</th>
        <th>Email</th>
        <th>Service</th>
        <th>Date</th>
        <th>Status</th>
    </tr>
</table>

</div>

<!-- ⚙️ SCRIPTS -->
<script>
// LOGIN
function login() {
    let pass = document.getElementById("password").value;

    if(pass === "admin123") {
        document.getElementById("loginBox").style.display = "none";
        document.getElementById("dashboard").style.display = "block";
        loadData();
    } else {
        alert("Wrong password");
    }
}

// LOAD GOOGLE SHEETS DATA
function loadData() {

const sheetURL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTb7XL1QJgObgxyHt3uyYixj7X6g0dXBnf8tch66o0nkXMiBpwWfh-X1thFUINmymESK-3sZqAu-0_g/pub?output=csv";

fetch(sheetURL)
.then(res => res.text())
.then(data => {

    let rows = data.split("\n").slice(1);

    document.getElementById("total").innerText = rows.length;

    let table = document.getElementById("table");

    rows.forEach(row => {
        let cols = row.split(",");

        if(cols.length > 3){

            let tr = document.createElement("tr");

            tr.innerHTML = `
                <td>${cols[0]}</td>
                <td>${cols[1]}</td>
                <td>${cols[2]}</td>
                <td>${cols[3]}</td>
                <td>
                    <select onchange="updateStatus(this)">
                        <option>Pending</option>
                        <option>Confirmed</option>
                        <option>Completed</option>
                    </select>
                </td>
            `;

            table.appendChild(tr);
        }
    });

});
}

// FILTER SYSTEM
function filterTable() {
    let filter = document.getElementById("filterService").value.toLowerCase();
    let rows = document.querySelectorAll("#table tr");

    rows.forEach((row, index) => {
        if(index === 0) return;

        let service = row.cells[2]?.innerText.toLowerCase();

        if(!filter || service.includes(filter)) {
            row.style.display = "";
        } else {
            row.style.display = "none";
        }
    });
}

// STATUS UPDATE (UI ONLY)
function updateStatus(select) {
    alert("Status updated to: " + select.value);
}
</script>

<!-- 📱 PWA SERVICE WORKER -->
<script>
if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js');
}
</script>

</body>
</html>
