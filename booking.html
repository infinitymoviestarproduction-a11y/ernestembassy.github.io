<form id="bookingForm">

    <input type="text" id="name" placeholder="Full Name" required><br><br>
    <input type="email" id="email" placeholder="Email" required><br><br>

    <select id="service" required>
        <option value="">Select Service</option>
        <option>Visa Processing</option>
        <option>Education Consulting</option>
        <option>Travel Consultation</option>
    </select><br><br>

    <input type="datetime-local" id="date" required><br><br>

    <button class="btn" type="submit">Book Appointment</button>
</form>

<script>
document.getElementById("bookingForm").addEventListener("submit", function(e) {
    e.preventDefault();

    fetch("https://script.google.com/macros/s/AKfycbyfHt4rOVDwC_SKUzT4pl-ASeq-DOP4AWYtKDhhqrDiWIldUTQMER8TgHJovllo7ZcT/exec", {
        method: "POST",
        body: JSON.stringify({
            name: document.getElementById("name").value,
            email: document.getElementById("email").value,
            service: document.getElementById("service").value,
            date: document.getElementById("date").value
        })
    })
    .then(() => {
        alert("Booking submitted successfully!");
        document.getElementById("bookingForm").reset();
    })
    .catch(() => {
        alert("Error submitting booking. Please try again.");
    });
});
</script>
