<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - Ernest Embassy</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0d0d0d;
            color: white;
            font-family: 'Segoe UI', Arial, sans-serif;
        }

        /* Navigation */
        nav {
            background: #1a1a2e;
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            border-bottom: 1px solid gold;
        }

        nav h1 {
            color: gold;
            font-size: 1.5rem;
        }

        nav a {
            color: white;
            text-decoration: none;
            margin-left: 20px;
        }

        nav a:hover {
            color: gold;
        }

        .logout-btn {
            background: #dc3545;
            color: white;
            border: none;
            padding: 8px 20px;
            border-radius: 5px;
            cursor: pointer;
        }

        .logout-btn:hover {
            background: #c82333;
        }

        /* Dashboard Stats */
        .dashboard-stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            padding: 30px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .stat-card {
            background: #111;
            border: 1px solid gold;
            padding: 25px;
            border-radius: 15px;
            text-align: center;
        }

        .stat-card h2 {
            font-size: 2.5rem;
            color: gold;
        }

        .stat-card p {
            color: #ccc;
            margin-top: 10px;
        }

        /* Filters */
        .filters {
            text-align: center;
            margin: 20px;
        }

        .filters select, .filters input {
            padding: 10px 15px;
            margin: 0 10px;
            border-radius: 8px;
            border: none;
            background: #222;
            color: white;
        }

        /* Table */
        .table-container {
            overflow-x: auto;
            padding: 20px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: #111;
            border-radius: 10px;
            overflow: hidden;
        }

        th, td {
            border: 1px solid #333;
            padding: 12px;
            text-align: left;
        }

        th {
            background: #1a1a2e;
            color: gold;
        }

        td {
            color: #ddd;
        }

        .status-pending {
            color: #ffc107;
            font-weight: bold;
        }

        .status-confirmed {
            color: #28a745;
            font-weight: bold;
        }

        .status-completed {
            color: #17a2b8;
            font-weight: bold;
        }

        /* Login Box */
        .login-box {
            max-width: 400px;
            margin: 100px auto;
            background: #111;
            padding: 40px;
            border-radius: 15px;
            text-align: center;
            border: 1px solid gold;
        }

        .login-box h2 {
            color: gold;
            margin-bottom: 20px;
        }

        .login-box input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border-radius: 8px;
            border: none;
            background: #222;
            color: white;
        }

        .login-box button {
            width: 100%;
            padding: 12px;
            background: gold;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
        }

        .error-msg {
            color: #dc3545;
            margin-top: 10px;
        }

        .loading {
            text-align: center;
            padding: 50px;
            color: gold;
        }

        footer {
            text-align: center;
            padding: 30px;
            color: #666;
        }
    </style>
</head>
<body>

<!-- LOGIN SECTION -->
<div id="loginSection" class="login-box">
    <h2>🔐 Admin Login</h2>
    <input type="password" id="adminPassword" placeholder="Enter Password">
    <button onclick="login()">Login</button>
    <div id="loginError" class="error-msg"></div>
</div>

<!-- DASHBOARD SECTION -->
<div id="dashboardSection" style="display: none;">
    <nav>
        <h1>🎬 Ernest Embassy Admin</h1>
        <div>
            <span style="color: white; margin-right: 20px;">Welcome, Damian</span>
            <button class="logout-btn" onclick="logout()">Logout</button>
        </div>
    </nav>

    <!-- Statistics Cards -->
    <div class="dashboard-stats">
        <div class="stat-card">
            <h2 id="totalSubmissions">0</h2>
            <p>Total Submissions</p>
        </div>
        <div class="stat-card">
            <h2 id="pendingCount">0</h2>
            <p>Pending Review</p>
        </div>
        <div class="stat-card">
            <h2 id="todayCount">0</h2>
            <p>Submissions Today</p>
        </div>
    </div>

    <!-- Filters -->
    <div class="filters">
        <select id="filterType" onchange="filterSubmissions()">
            <option value="all">All Types</option>
            <option value="visa">Visa Consultation</option>
            <option value="film">Film Inquiry</option>
            <option value="tutoring">Tutoring Request</option>
        </select>
        <input type="text" id="searchInput" placeholder="Search by name or email..." onkeyup="filterSubmissions()">
    </div>

    <!-- Submissions Table -->
    <div class="table-container">
        <table id="submissionsTable">
            <thead>
                <tr>
                    <th>Date</th>
                    <th>Type</th>
                    <th>Name</th>
                    <th>Email</th>
                    <th>Phone</th>
                    <th>Details</th>
                    <th>Status</th>
                </tr>
            </thead>
            <tbody id="tableBody">
                <tr><td colspan="7" style="text-align: center;">Loading submissions...</td></tr>
            </tbody>
        </table>
    </div>

    <footer>
        <p>Ernest Embassy Travels & Infinity Movie Star Production | Admin Dashboard</p>
    </footer>
</div>

<script>
    // Sample data for demonstration
    // In production, this would fetch from Netlify Forms API or a backend
    let submissions = [];

    // Login function
    function login() {
        const password = document.getElementById('adminPassword').value;
        // Change this password to something strong
        if (password === 'ErnestAdmin2026!') {
            document.getElementById('loginSection').style.display = 'none';
            document.getElementById('dashboardSection').style.display = 'block';
            loadSubmissions();
        } else {
            document.getElementById('loginError').innerText = 'Incorrect password. Access denied.';
        }
    }

    function logout() {
        document.getElementById('loginSection').style.display = 'block';
        document.getElementById('dashboardSection').style.display = 'none';
        document.getElementById('adminPassword').value = '';
        document.getElementById('loginError').innerText = '';
    }

    // Load submissions (sample data - replace with actual data source)
    function loadSubmissions() {
        // Sample data structure
        const sampleData = [
            { date: '2026-05-15', type: 'visa', name: 'John Okonkwo', email: 'john@example.com', phone: '08012345678', details: 'Student visa to Canada', status: 'pending' },
            { date: '2026-05-14', type: 'film', name: 'Amara Eze', email: 'amara@example.com', phone: '08023456789', details: 'Acting training interest', status: 'confirmed' },
            { date: '2026-05-14', type: 'tutoring', name: 'Chidi Nwosu', email: 'chidi@example.com', phone: '08034567890', details: 'English and Digital Tech', status: 'pending' },
            { date: '2026-05-13', type: 'visa', name: 'Ngozi Obi', email: 'ngozi@example.com', phone: '08045678901', details: 'Tourist visa to UK', status: 'completed' },
        ];

        submissions = sampleData;
        updateStats();
        displaySubmissions();
    }

    function updateStats() {
        document.getElementById('totalSubmissions').innerText = submissions.length;
        const pending = submissions.filter(s => s.status === 'pending').length;
        document.getElementById('pendingCount').innerText = pending;
        
        const today = new Date().toISOString().split('T')[0];
        const todayCount = submissions.filter(s => s.date === today).length;
        document.getElementById('todayCount').innerText = todayCount;
    }

    function displaySubmissions() {
        const filterType = document.getElementById('filterType').value;
        const searchTerm = document.getElementById('searchInput').value.toLowerCase();
        
        const filtered = submissions.filter(sub => {
            if (filterType !== 'all' && sub.type !== filterType) return false;
            if (searchTerm && !sub.name.toLowerCase().includes(searchTerm) && !sub.email.toLowerCase().includes(searchTerm)) return false;
            return true;
        });

        const tbody = document.getElementById('tableBody');
        if (filtered.length === 0) {
            tbody.innerHTML = '<tr><td colspan="7" style="text-align: center;">No submissions found</td></tr>';
            return;
        }

        tbody.innerHTML = filtered.map(sub => {
            let typeLabel = '';
            let typeIcon = '';
            if (sub.type === 'visa') { typeLabel = '✈️ Visa'; typeIcon = 'visa'; }
            else if (sub.type === 'film') { typeLabel = '🎬 Film'; typeIcon = 'film'; }
            else { typeLabel = '📚 Tutoring'; typeIcon = 'tutoring'; }
            
            let statusClass = '';
            if (sub.status === 'pending') statusClass = 'status-pending';
            else if (sub.status === 'confirmed') statusClass = 'status-confirmed';
            else statusClass = 'status-completed';
            
            return `<tr>
                <td>${sub.date}</td>
                <td>${typeLabel}</td>
                <td>${sub.name}</td>
                <td>${sub.email}</td>
                <td>${sub.phone}</td>
                <td>${sub.details}</td>
                <td class="${statusClass}">${sub.status.toUpperCase()}</td>
            </tr>`;
        }).join('');
    }

    function filterSubmissions() {
        displaySubmissions();
    }
</script>

</body>
</html>
