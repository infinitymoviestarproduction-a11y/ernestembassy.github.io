<form action="https://formspree.io/f/YOUR_FILM_ENDPOINT" method="POST">
    <input type="hidden" name="_next" value="https://ernest-embassy.pages.dev/thank-you.html">
    <input type="text" name="_gotcha" style="display:none">
    
    <div class="form-group">
        <label>Full Name *</label>
        <input type="text" name="name" required>
    </div>

    <div class="form-group">
        <label>Email Address *</label>
        <input type="email" name="email" required>
    </div>

    <div class="form-group">
        <label>Phone Number *</label>
        <input type="tel" name="phone" required>
    </div>

    <div class="form-group">
        <label>Interest *</label>
        <select name="interest" required>
            <option value="">Select an option</option>
            <option value="Acting Training">Acting Training</option>
            <option value="Directing Training">Directing Training</option>
            <option value="Scriptwriting">Scriptwriting</option>
            <option value="Editing Training">Editing Training</option>
            <option value="Movie Production Service">Movie Production Service</option>
        </select>
    </div>

    <div class="form-group">
        <label>Your Message / Goals</label>
        <textarea name="message" rows="4" placeholder="Tell us about your film project or training goals..."></textarea>
    </div>

    <button type="submit" class="submit-btn">🎬 Submit Inquiry</button>
</form>
