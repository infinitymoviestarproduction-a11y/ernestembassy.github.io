<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Offline - Ernest Embassy</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: white;
            text-align: center;
            padding: 100px 20px;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .container {
            max-width: 500px;
            margin: 0 auto;
            background: rgba(0,0,0,0.3);
            padding: 50px;
            border-radius: 20px;
        }
        .emoji {
            font-size: 4rem;
            margin-bottom: 20px;
        }
        h1 {
            font-size: 2rem;
            margin-bottom: 20px;
        }
        p {
            font-size: 1.1rem;
            margin-bottom: 15px;
            line-height: 1.6;
        }
        .retry-btn {
            display: inline-block;
            background: #ffd700;
            color: #1a1a2e;
            padding: 12px 30px;
            border-radius: 30px;
            text-decoration: none;
            font-weight: bold;
            margin-top: 20px;
            transition: all 0.3s;
        }
        .retry-btn:hover {
            background: #e6c200;
            transform: translateY(-2px);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="emoji">📡</div>
        <h1>You're Offline</h1>
        <p>Please check your internet connection and try again.</p>
        <p>Once connected, refresh the page to access all features.</p>
        <button onclick="location.reload()" class="retry-btn">🔄 Retry Connection</button>
    </div>
</body>
</html>
