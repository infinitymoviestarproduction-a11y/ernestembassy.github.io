<form action="https://formspree.io/f/YOUR_BOOKING_ENDPOINT" method="POST">
    <input type="hidden" name="_next" value="https://ernest-embassy.pages.dev/thank-you.html">
    <input type="text" name="_gotcha" style="display:none">
    
    <div class="form-group">
        <label>Full Name *</label>
        <input type="text" name="name" required>
    </div>

    <div class="form-group">
        <label>Email Address *</label>
        <input type="email" name="email" required>
    </div>

    <div class="form-group">
        <label>Phone Number *</label>
        <input type="tel" name="phone" required>
    </div>

    <div class="form-group">
        <label>Service Needed *</label>
        <select name="service" required>
            <option value="">Select a service</option>
            <option value="Visa Processing">✈️ Visa Processing</option>
            <option value="Film Training">🎬 Film Training</option>
            <option value="Movie Production">🎥 Movie Production</option>
            <option value="Educational Consulting">📚 Educational Consulting</option>
            <option value="Online Tutoring">💻 Online Tutoring</option>
        </select>
    </div>

    <div class="form-group">
        <label>Preferred Date *</label>
        <input type="date" name="date" required>
    </div>

    <div class="form-group">
        <label>Preferred Time</label>
        <select name="time">
            <option value="">Select time</option>
            <option value="Morning (9am - 12pm)">Morning (9am - 12pm)</option>
            <option value="Afternoon (12pm - 3pm)">Afternoon (12pm - 3pm)</option>
            <option value="Evening (3pm - 6pm)">Evening (3pm - 6pm)</option>
        </select>
    </div>

    <div class="form-group">
        <label>Additional Message</label>
        <textarea name="message" rows="4" placeholder="Tell us more about what you need..."></textarea>
    </div>

    <button type="submit" class="submit-btn">📨 Book Appointment</button>
</form>
