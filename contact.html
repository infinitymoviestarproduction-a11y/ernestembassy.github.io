<form action="https://formspree.io/f/YOUR_CONTACT_ENDPOINT" method="POST">
    <input type="hidden" name="_next" value="https://ernest-embassy.pages.dev/thank-you.html">
    <input type="text" name="_gotcha" style="display:none">
    
    <div class="form-group">
        <label>Your Name *</label>
        <input type="text" name="name" required>
    </div>

    <div class="form-group">
        <label>Your Email *</label>
        <input type="email" name="email" required>
    </div>

    <div class="form-group">
        <label>Service Needed *</label>
        <select name="service" required>
            <option value="">Select Service</option>
            <option value="Visa Processing">✈️ Visa Processing</option>
            <option value="Film Production">🎬 Film Production</option>
            <option value="Film Training">🎭 Film Training</option>
            <option value="Educational Consulting">🎓 Educational Consulting</option>
            <option value="Online Tutoring">💻 Online Tutoring</option>
        </select>
    </div>

    <div class="form-group">
        <label>Your Message *</label>
        <textarea name="message" rows="5" required></textarea>
    </div>

    <button type="submit" class="btn btn-primary">📧 Send Message</button>
</form>
