<form action="https://formspree.io/f/YOUR_TUTORING_ENDPOINT" method="POST">
    <input type="hidden" name="_next" value="https://ernest-embassy.pages.dev/thank-you.html">
    <input type="text" name="_gotcha" style="display:none">
    
    <div class="form-group">
        <label>Full Name *</label>
        <input type="text" name="name" required>
    </div>
    <div class="form-group">
        <label>Email Address *</label>
        <input type="email" name="email" required>
    </div>
    <div class="form-group">
        <label>Phone Number *</label>
        <input type="tel" name="phone" required>
    </div>
    <div class="form-group">
        <label>Subject Needed *</label>
        <select name="subject" required>
            <option value="">Select subject</option>
            <option value="English Language">English Language</option>
            <option value="Digital Technology">Digital Technology</option>
            <option value="Igbo (Diaspora)">Igbo (Diaspora)</option>
            <option value="Science Exam Prep">Science Exam Prep</option>
            <option value="Adult Literacy">Adult Literacy</option>
        </select>
    </div>
    <div class="form-group">
        <label>Grade/Level *</label>
        <input type="text" name="grade" placeholder="e.g., Primary 5, JSS 2, SS 1, Adult">
    </div>
    <div class="form-group">
        <label>Message</label>
        <textarea name="message" rows="3" placeholder="Tell us about your learning goals..."></textarea>
    </div>
    <button type="submit" class="submit-btn">📚 Book Session</button>
</form>
