<form action="https://formspree.io/f/xlgvrodp" method="POST">
    <input type="hidden" name="_next" value="https://ernest-embassy.pages.dev/thank-you.html">
    <input type="text" name="_gotcha" style="display:none">
    
    <div class="form-group">
        <label>Full Name *</label>
        <input type="text" name="fullname" required>
    </div>

    <div class="form-group">
        <label>Email Address *</label>
        <input type="email" name="email" required>
    </div>

    <div class="form-group">
        <label>Phone Number *</label>
        <input type="tel" name="phone" required>
    </div>

    <div class="form-group">
        <label>Country You Are Applying From *</label>
        <select name="country_from" required>
            <option value="">Select Country</option>
            <option value="Nigeria">🇳🇬 Nigeria</option>
            <option value="Ghana">🇬🇭 Ghana</option>
            <option value="Kenya">🇰🇪 Kenya</option>
            <option value="South Africa">🇿🇦 South Africa</option>
            <option value="United Kingdom">🇬🇧 United Kingdom</option>
            <option value="United States">🇺🇸 United States</option>
            <option value="Canada">🇨🇦 Canada</option>
            <option value="Other">🌍 Other</option>
        </select>
    </div>

    <div class="form-group">
        <label>Destination Country *</label>
        <input type="text" name="destination" placeholder="e.g., Canada, UK, USA" required>
    </div>

    <div class="form-group">
        <label>Visa Type *</label>
        <div class="radio-group">
            <label><input type="radio" name="visa_type" value="Student" required> Student Visa</label>
            <label><input type="radio" name="visa_type" value="Tourist"> Tourist Visa</label>
            <label><input type="radio" name="visa_type" value="Work"> Work Visa</label>
        </div>
    </div>

    <div class="form-group">
        <label>Do You Have a Valid Passport? *</label>
        <div class="radio-group">
            <label><input type="radio" name="has_passport" value="Yes" required> Yes</label>
            <label><input type="radio" name="has_passport" value="No"> No</label>
        </div>
    </div>

    <div class="form-group">
        <label>Previous Visa Refusal? *</label>
        <div class="radio-group">
            <label><input type="radio" name="previous_refusal" value="Yes" required> Yes</label>
            <label><input type="radio" name="previous_refusal" value="No"> No</label>
        </div>
    </div>

    <div class="form-group">
        <label>Message / Additional Information</label>
        <textarea name="message" rows="4" placeholder="Tell us more about your travel plans..."></textarea>
    </div>

    <button type="submit" class="submit-btn">📨 Submit Visa Request</button>
</form>
