<!-- BOOKING FORM -->
<div class="form-container">
    <h2>Book an Appointment</h2>
    <form name="booking-request" method="POST" data-netlify="true" netlify-honeypot="bot-field">
        <input type="hidden" name="form-name" value="booking-request">
        <p style="display: none;"><label>Don't fill this out: <input name="bot-field"></label></p>
        
        <div class="form-group">
            <label>Full Name *</label>
            <input type="text" name="name" id="name" required>
        </div>
        
        <div class="form-group">
            <label>Email Address *</label>
            <input type="email" name="email" id="email" required>
        </div>
        
        <div class="form-group">
            <label>Phone Number *</label>
            <input type="tel" name="phone" id="phone" required>
        </div>
        
        <div class="form-group">
            <label>Service Needed *</label>
            <select name="service" id="service" required>
                <option value="">Select a service</option>
                <option value="Visa Processing">Visa Processing</option>
                <option value="Film Training">Film Training</option>
                <option value="Movie Production">Movie Production</option>
                <option value="Educational Consulting">Educational Consulting</option>
                <option value="Online Tutoring">Online Tutoring</option>
            </select>
        </div>
        
        <div class="form-group">
            <label>Preferred Date *</label>
            <input type="date" name="date" id="date" required>
        </div>
        
        <div class="form-group">
            <label>Preferred Time</label>
            <select name="time">
                <option value="">Select time</option>
                <option value="Morning (9am - 12pm)">Morning (9am - 12pm)</option>
                <option value="Afternoon (12pm - 3pm)">Afternoon (12pm - 3pm)</option>
                <option value="Evening (3pm - 6pm)">Evening (3pm - 6pm)</option>
            </select>
        </div>
        
        <div class="form-group">
            <label>Additional Message</label>
            <textarea name="message" rows="3" placeholder="Tell us more about what you need..."></textarea>
        </div>
        
        <button type="submit" class="submit-btn">Book Appointment</button>
    </form>
    
    <div id="bookingSuccess" class="success-message" style="display:none;">
        ✅ Thank you! Your appointment request has been sent. We will contact you within 24 hours.
    </div>
</div>
